# 当 GitHub Pages 相关文件被推送到 main/master 时，向微信发提醒。
#
# 【个人微信 —— 推荐】Server酱 Turbo：
#   1. https://sct.ftqq.com/ 注册（微信扫码）
#   2. 「消息通道」绑定个人微信
#   3. 复制 SendKey（形如 SCTxxxx…）
#   4. 仓库 Settings → Secrets and variables → Actions → New repository secret
#      名称：SERVERCHAN_SENDKEY，值：SendKey
#
# 【可选】企业微信：Secret WECOM_WEBHOOK_URL = 群机器人 Webhook 完整 URL（可与 Server酱同时配）
#
# 【可选】站点链接展示在正文：Secret PAGES_SITE_URL，例如 https://xxx.github.io/inventory/
#
# 通知正文会附带本次推送中 index.html / 404.html / CNAME 的 unified diff（过长会自动截断）。
# 企业微信单条约 4KB 内；Server酱可更长。完整 diff 见 GitHub 提交页。

name: Notify site change (WeChat)

on:
  push:
    branches: [main, master]
    paths:
      - 'index.html'
      - '404.html'
      - 'CNAME'
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Send WeChat notifications
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          PAGES_SITE_URL: ${{ secrets.PAGES_SITE_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_BEFORE: ${{ github.event.before || '' }}
          COMMITS_JSON: ${{ github.event_name == 'push' && toJson(github.event.commits) || '[]' }}
        run: |
          python3 << 'PY'
          import json, os, subprocess, sys, urllib.error, urllib.request

          SITE_PATHS = ("index.html", "404.html", "CNAME")

          def trunc(s, n=900):
              s = (s or "").replace("\r", "").strip()
              return s if len(s) <= n else s[: n - 1] + "…"

          def trunc_utf8_bytes(s, max_bytes):
              if not s:
                  return ""
              b = s.encode("utf-8")
              if len(b) <= max_bytes:
                  return s
              b = b[: max_bytes - 30]
              while b:
                  try:
                      return b.decode("utf-8") + "\n…(以下已截断，见 GitHub 提交)"
                  except UnicodeDecodeError:
                      b = b[:-1]
              return "…"

          def git(*args):
              ws = os.environ.get("GITHUB_WORKSPACE", ".")
              return subprocess.check_output(["git"] + list(args), cwd=ws, text=True, stderr=subprocess.DEVNULL).strip()

          def git_diff_site_files():
              """本次推送中与站点相关的具体差异（unified diff）。"""
              before = (os.environ.get("GITHUB_BEFORE") or "").strip()
              sha = (os.environ.get("GITHUB_SHA") or "").strip()
              ws = os.environ.get("GITHUB_WORKSPACE", ".")
              cmd_base = ["git", "-c", "core.quotepath=false"]

              def run(args):
                  return subprocess.check_output(
                      cmd_base + args, cwd=ws, text=True, stderr=subprocess.DEVNULL
                  )

              try:
                  if before and before != "0" * 40 and sha:
                      return run(["diff", "--no-color", "-U5", before, sha, "--", *SITE_PATHS])
              except Exception as e:
                  print("git diff before..after:", e)
              try:
                  return run(
                      ["show", "--no-color", "-U5", "--pretty=format:", "HEAD", "--", *SITE_PATHS]
                  )
              except Exception as e:
                  print("git show HEAD:", e)
              return ""

          def changed_files():
              raw = os.environ.get("COMMITS_JSON") or "[]"
              if raw.strip() in ("", "null"):
                  commits = []
              else:
                  try:
                      commits = json.loads(raw)
                  except json.JSONDecodeError:
                      commits = []
              if not isinstance(commits, list):
                  commits = []
              names = set()
              for c in commits:
                  if not isinstance(c, dict):
                      continue
                  for k in ("added", "modified", "removed"):
                      names.update(c.get(k) or [])
              if names:
                  return sorted(names)
              before = (os.environ.get("GITHUB_BEFORE") or "").strip()
              sha = (os.environ.get("GITHUB_SHA") or "").strip()
              try:
                  if before and before != "0" * 40 and sha:
                      out = git("diff", "--name-only", before, sha)
                  else:
                      out = git("diff-tree", "--no-commit-id", "--name-only", "-r", "HEAD")
                  return [x for x in out.splitlines() if x.strip()]
              except Exception:
                  return []

          def commit_subject():
              try:
                  return git("log", "-1", "--pretty=%s")
              except Exception:
                  return ""

          repo = os.environ.get("GITHUB_REPOSITORY", "")
          sha = (os.environ.get("GITHUB_SHA") or "")[:12]
          actor = os.environ.get("GITHUB_ACTOR", "")
          base = os.environ.get("GITHUB_SERVER_URL", "https://github.com")
          compare = f"{base}/{repo}/commit/{os.environ.get('GITHUB_SHA', '')}"
          site = (os.environ.get("PAGES_SITE_URL") or "").strip()

          msg = trunc(commit_subject())
          files = changed_files()
          file_line = "变更文件: " + (", ".join(files) if files else "（未能列举，请见提交）")

          lines = [
              "【TARTGO】网页已更新（GitHub 已收到推送）",
              file_line,
              f"仓库: {repo}",
              f"提交: {sha}",
              f"操作: {actor}",
              f"说明: {msg or '—'}",
              f"提交页: {compare}",
          ]
          if site:
              lines.append(f"站点: {site}")

          diff_raw = (git_diff_site_files() or "").replace("\r\n", "\n")
          if not diff_raw.strip():
              diff_section = "（无文本差异或仅二进制变更）"
          else:
              diff_section = diff_raw.strip()

          header = "\n".join(lines)
          # Server酱 desp 可较长；企业微信 markdown 内容约 ≤4096 字节
          desp = header + "\n\n──────── 具体变更 (diff) ────────\n\n```diff\n" + trunc(diff_section, 14000) + "\n```"
          text = header + "\n\n──────── 具体变更 (diff) ────────\n\n" + trunc(diff_section, 6000)

          wecom_markdown = (
              "### 【TARTGO】网页已更新\n"
              + "> "
              + trunc(file_line.replace("\n", " "), 200)
              + "\n> "
              + trunc(msg.replace("\n", " "), 200)
              + "\n> "
              + f"[查看提交]({compare})\n\n"
              + "```diff\n"
              + trunc_utf8_bytes(diff_section, 3200)
              + "\n```"
          )

          wecom = (os.environ.get("WECOM_WEBHOOK_URL") or "").strip()
          skey = (os.environ.get("SERVERCHAN_SENDKEY") or "").strip()

          if not wecom and not skey:
              print("未配置 SERVERCHAN_SENDKEY 或 WECOM_WEBHOOK_URL，跳过通知。")
              print("按 workflow 文件顶部注释在仓库 Secrets 里添加即可。")
              raise SystemExit(0)

          ok_any = False

          if wecom:
              try:
                  body = json.dumps(
                      {
                          "msgtype": "markdown",
                          "markdown": {"content": trunc_utf8_bytes(wecom_markdown, 4000)},
                      },
                      ensure_ascii=False,
                  ).encode("utf-8")
                  req = urllib.request.Request(
                      wecom,
                      data=body,
                      headers={"Content-Type": "application/json; charset=utf-8"},
                      method="POST",
                  )
                  with urllib.request.urlopen(req, timeout=25) as r:
                      out = r.read().decode("utf-8", errors="replace")
                      print("WeCom response:", out[:500])
                      try:
                          j = json.loads(out)
                          if j.get("errcode") in (0, None):
                              ok_any = True
                      except Exception:
                          ok_any = True
              except Exception as e:
                  print("WeCom failed:", e)

          if skey:
              try:
                  api = f"https://sctapi.ftqq.com/{skey}.send"
                  sc_body = json.dumps(
                      {"title": "【TARTGO】网页已更新", "desp": desp},
                      ensure_ascii=False,
                  ).encode("utf-8")
                  sc_req = urllib.request.Request(
                      api,
                      data=sc_body,
                      headers={"Content-Type": "application/json; charset=utf-8"},
                      method="POST",
                  )
                  with urllib.request.urlopen(sc_req, timeout=25) as r:
                      raw = r.read().decode("utf-8", errors="replace")
                      print("ServerChan response:", raw[:800])
                      try:
                          j = json.loads(raw)
                          code = j.get("code")
                          errno = j.get("errno")
                          if code in (0, None) and errno in (0, None):
                              ok_any = True
                          elif j.get("data", {}).get("errno") in (0, None):
                              ok_any = True
                      except Exception:
                          if "error" not in raw.lower()[:120]:
                              ok_any = True
              except urllib.error.HTTPError as e:
                  print("ServerChan HTTPError:", e.code, e.read()[:400] if e.fp else "")
              except Exception as e:
                  print("ServerChan failed:", e)

          if (wecom or skey) and not ok_any:
              print("所有已配置通道均未确认成功，请检查 SendKey / Webhook。")
              raise SystemExit(1)
          raise SystemExit(0)
          PY
