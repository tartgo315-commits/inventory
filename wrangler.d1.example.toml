# 仅作本地 wrangler pages dev 参考：复制为 wrangler.toml 后再改 database_id。
# 生产环境 D1 以 Cloudflare Dashboard → Pages → inventory → Bindings 为准，可不提交 wrangler.toml。
name = "inventory"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"

[[d1_databases]]
binding = "DB"
database_name = "tartgo-inventory"
database_id = "REPLACE_WITH_YOUR_D1_ID"
