# 存在 wrangler.toml 时，Cloudflare 会把它当作配置来源；D1 必须在此声明，否则线上 env.DB 为空。
# API 在根目录 _worker.js（Advanced Mode）。database_id 与 D1 控制台一致。
name = "inventory"
pages_build_output_dir = "."
compatibility_date = "2025-04-01"

[[d1_databases]]
binding = "DB"
database_name = "tartgo-inventory"
database_id = "249b0605-3ed1-42cb-b0b0-aec821ea59fa"
