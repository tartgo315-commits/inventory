# Pages 从 Git 部署时，若 D1 未生效：Dashboard → Workers & Pages → inventory → Settings → Bindings → D1 变量名 DB
# name 与 Cloudflare 上的 Pages 项目名一致；pages_build_output_dir 避免仅 wrangler 时被误判
name = "inventory"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"

[[d1_databases]]
binding = "DB"
database_name = "tartgo-inventory"
database_id = "249b0605-3ed1-42cb-b0b0-aec821ea59fa"
